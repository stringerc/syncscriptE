# Proves http://127.0.0.1:8000/docs works on a real machine with Docker (GitHub-hosted runner).
# Cursor/agents without Docker cannot bind localhost:8000; this workflow is the verifiable substitute.
name: Verify Engram Swagger

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'integrations/engram-overrides/**'
      - 'integrations/verify-engram-docs.sh'
      - 'supabase/functions/make-server-57781ad9/engram-bridge.tsx'
      - 'tests/engram-edge-contract.test.mjs'
      - '.github/workflows/verify-engram-docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'integrations/engram-overrides/**'
      - 'integrations/verify-engram-docs.sh'
      - 'supabase/functions/make-server-57781ad9/engram-bridge.tsx'
      - 'tests/engram-edge-contract.test.mjs'
      - '.github/workflows/verify-engram-docs.yml'

jobs:
  verify-localhost-8000:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Clone Engram (upstream)
        run: git clone --depth 1 https://github.com/kwstx/engram_translator.git /tmp/engram

      - name: Apply SyncScript overrides (Swagger / CSP fix)
        run: |
          cp -f "${GITHUB_WORKSPACE}/integrations/engram-overrides/app-main.py" /tmp/engram/app/main.py
          cp -f "${GITHUB_WORKSPACE}/integrations/engram-overrides/dot-env.ci" /tmp/engram/.env
          cp -f "${GITHUB_WORKSPACE}/integrations/engram-overrides/docker-compose.override.yml" /tmp/engram/docker-compose.override.yml
          cp -f "${GITHUB_WORKSPACE}/integrations/engram-overrides/dot-dockerignore" /tmp/engram/.dockerignore
          cp -f "${GITHUB_WORKSPACE}/integrations/engram-overrides/requirements.txt" /tmp/engram/requirements.txt
          mkdir -p /tmp/engram/app/db /tmp/engram/app/services /tmp/engram/app/api/v1 /tmp/engram/app/core
          cp -f "${GITHUB_WORKSPACE}/integrations/engram-overrides/app/db/models.py" /tmp/engram/app/db/models.py
          cp -f "${GITHUB_WORKSPACE}/integrations/engram-overrides/app/services/registry_service.py" /tmp/engram/app/services/registry_service.py
          cp -f "${GITHUB_WORKSPACE}/integrations/engram-overrides/app/services/discovery.py" /tmp/engram/app/services/discovery.py
          cp -f "${GITHUB_WORKSPACE}/integrations/engram-overrides/app/api/v1/registry.py" /tmp/engram/app/api/v1/registry.py
          cp -f "${GITHUB_WORKSPACE}/integrations/engram-overrides/app/api/v1/endpoints.py" /tmp/engram/app/api/v1/endpoints.py
          cp -f "${GITHUB_WORKSPACE}/integrations/engram-overrides/app/core/exceptions.py" /tmp/engram/app/core/exceptions.py
          mkdir -p /tmp/engram/alembic/versions
          cp -f "${GITHUB_WORKSPACE}/integrations/engram-overrides/alembic/versions/75c7e2369caa_initial_baseline.py" /tmp/engram/alembic/versions/75c7e2369caa_initial_baseline.py
          cp -f "${GITHUB_WORKSPACE}/integrations/engram-overrides/alembic/versions/b2c3d4e5f6a7_agent_registry_model_parity.py" /tmp/engram/alembic/versions/b2c3d4e5f6a7_agent_registry_model_parity.py

      - name: Start Postgres + Redis
        working-directory: /tmp/engram
        run: docker compose up -d --build db redis

      - name: Wait for Postgres
        working-directory: /tmp/engram
        run: |
          set -e
          for i in $(seq 1 45); do
            if docker compose exec -T db pg_isready -U admin 2>/dev/null; then
              echo "Postgres is ready."
              exit 0
            fi
            echo "waiting for Postgres... ($i)"
            sleep 2
          done
          docker compose logs db
          exit 1

      - name: Build & start API
        working-directory: /tmp/engram
        run: docker compose up -d --build app

      - name: Wait for HTTP 200 on /
        run: |
          set -e
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8000/ >/dev/null; then
              echo "Engram app responding on :8000"
              exit 0
            fi
            echo "waiting for app... ($i)"
            sleep 2
          done
          exit 1

      - name: Verify /docs + /openapi.json (same checks as integrations/verify-engram-docs.sh)
        run: |
          chmod +x "${GITHUB_WORKSPACE}/integrations/verify-engram-docs.sh"
          "${GITHUB_WORKSPACE}/integrations/verify-engram-docs.sh" http://127.0.0.1:8000

      - name: App logs on failure
        if: failure()
        working-directory: /tmp/engram
        run: docker compose logs --no-color app db 2>&1 | tail -400
