name: Import Boundaries Check

on:
  push:
    branches: [ main, hardening/* ]
  pull_request:
    branches: [ main, hardening/* ]

jobs:
  boundaries:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        cd server && npm install
        cd ../client && npm install
    
    - name: Check import boundaries
      run: |
        cd server
        npx eslint src/ --config .eslintrc.boundaries.js --format=json --output-file=boundaries-report.json || true
        if [ -f boundaries-report.json ]; then
          echo "Import boundary violations found:"
          cat boundaries-report.json | jq '.[] | select(.messages | length > 0) | {filePath: .filePath, messages: .messages}'
        fi
    
    - name: Build packages
      run: |
        npx tsc --build --force || true
    
    - name: Check package structure
      run: |
        for pkg in packages/*/src/index.ts; do
          if [ -f "$pkg" ]; then
            echo "✓ Package $pkg exists"
          else
            echo "✗ Package $pkg missing"
            exit 1
          fi
        done
    
    - name: Verify adapters exist
      run: |
        if [ -f "server/src/adapters/energyGamificationAdapter.ts" ]; then
          echo "✓ Energy-Gamification adapter exists"
        else
          echo "✗ Energy-Gamification adapter missing"
          exit 1
        fi
