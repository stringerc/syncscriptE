name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: App AI React import guard
        run: node scripts/guard-app-ai-react-imports.mjs

      - name: ESLint (app shell + Ai chrome)
        run: npm run lint

      # Full-project `tsc` is not green yet (legacy `sonner@2.0.3` imports, etc.).
      # `npm run build` + ESLint remain the merge gates until a root tsconfig passes.
      - name: TypeScript check (skipped — tracked in Tier 0 C backlog)
        run: echo "::notice title=TypeScript gate::Full tsc is deferred; vite build + eslint gate PRs. See MEMORY.md 2026-04-26."

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder

      # Tier 0 C fix: bundle-size budget so a 5MB import can't sneak through
      # silently. Fails the build when any single chunk exceeds the cap.
      # Threshold tuned for current biggest-known chunk (`vendor-three`
      # ~493 KB / `feature-goals-advanced` ~480 KB) with headroom; bump
      # deliberately when we add a new heavy feature.
      - name: Bundle size guard
        run: node scripts/check-bundle-size.mjs --max-kb=900 --include='build/assets/*.js'

      # Tier 0 C: Lighthouse against the freshly-built preview (not prod), so
      # PRs catch perf/a11y/SEO regressions before merge. Uses the same thresholds
      # as `lighthouserc.cjs` (Perf is now `error`, not `warn`).
      - name: Lighthouse CI (Vite preview)
        run: |
          set -e
          npx vite preview --host 127.0.0.1 --port 4177 --strictPort &
          PID=$!
          trap 'kill $PID 2>/dev/null || true' EXIT
          for i in $(seq 1 45); do
            if curl -sf "http://127.0.0.1:4177/" >/dev/null 2>&1; then break; fi
            sleep 1
          done
          LHCI_URL=http://127.0.0.1:4177/ npx lhci autorun --config=./lighthouserc.cjs

  contract-tests:
    name: Contract + smoke tests (npm test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      # Tier 0 C fix: this is the canonical 105-test suite (Nexus contracts,
      # voice pipeline, RLS migration shapes, agent mode, webhooks, etc.).
      # Previously not run on PRs — meaning a contract regression got past
      # CI all the way to prod. Now it gates every merge.
      - name: npm test (contract + smoke)
        run: npm test
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder

  dashboard-nav-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Production build (Playwright preview)
        run: CI=true npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder

      - name: Dashboard sidebar navigation (guest session)
        run: CI=true npx playwright test e2e/dashboard-nav.spec.ts e2e/dashboard-nav-legacy-redirect.spec.ts
        env:
          CI: true
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder

  visual-quality-e2e:
    name: Layout, screenshots, Axe (Chromium + Firefox canary)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Install Playwright (Chromium + Firefox)
        run: npx playwright install chromium firefox --with-deps
      - name: Visual quality (build + 3 spec files)
        run: npm run test:e2e:visual-quality
        env:
          CI: true
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder

  app-ai-composer-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      # Skips until secrets are set. Set repo Variable REQUIRE_APP_AI_E2E=1 to
      # **fail** the job when secrets are missing (Tier 0 C — no false-green).
      - name: App AI composer E2E (signed-in smoke)
        run: |
          MISSING=0
          [ -z "${{ secrets.E2E_LOGIN_EMAIL }}" ] && MISSING=1
          [ -z "${{ secrets.E2E_LOGIN_PASSWORD }}" ] && MISSING=1
          [ -z "${{ secrets.VITE_SUPABASE_URL }}" ] && MISSING=1
          [ -z "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ] && MISSING=1
          if [ "$MISSING" = "1" ]; then
            if [ "${{ vars.REQUIRE_APP_AI_E2E }}" = "1" ]; then
              echo "::error title=App AI E2E required::REQUIRE_APP_AI_E2E=1 but one or more of E2E_LOGIN_EMAIL, E2E_LOGIN_PASSWORD, VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY are unset."
              exit 1
            fi
            echo "::notice title=App AI E2E skipped::Add secrets (or set REQUIRE_APP_AI_E2E=1 after wiring them)."
            exit 0
          fi
          npm run test:e2e:app-ai-composer
        env:
          CI: true
          E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
          E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
