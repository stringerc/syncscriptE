# Live Nexus tool loop + Edge tasks (same JWT pattern as Engram Edge verify).
# Secrets are optional: without GROQ_API_KEY / JWT the job may skip or fail Step 1.
#
# Reuses ENGRAM_LIVE_USER_JWT so one repository secret powers both Engram discover smoke
# and Nexus Step 2 (see scripts/verify-nexus-tools-live.ts).

name: Nexus tools live verify

on:
  workflow_dispatch:
  schedule:
    - cron: "45 1,9,17 * * *"
  push:
    branches: [main]
    paths:
      - "scripts/verify-nexus-tools-live.ts"
      - "api/_lib/nexus-tool-loop.ts"
      - "api/_lib/nexus-actions-executor.ts"
      - ".github/workflows/nexus-tools-live.yml"

concurrency:
  group: nexus-tools-live-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      # Same signed-in user JWT as Edge bridges / Engram discover (optional).
      NEXUS_LIVE_TEST_JWT: ${{ secrets.ENGRAM_LIVE_USER_JWT }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Nexus tools live (Step 1 + optional Step 2)
        run: npm run verify:nexus-tools-live
