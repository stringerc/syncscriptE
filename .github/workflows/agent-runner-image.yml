name: Build agent runner image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "deploy/nexus-agent-runner/**"
      - ".github/workflows/agent-runner-image.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: agent-runner-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/syncscript-nexus-agent-runner
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push (linux/amd64 + linux/arm64 — Oracle Always-Free is ARM)
        uses: docker/build-push-action@v6
        with:
          context: deploy/nexus-agent-runner
          file: deploy/nexus-agent-runner/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
