# Weekly snapshot: npm registry vs local CLIs (OpenClaw, cursor-agent, claude when present).
# Hermes is repo-local — no registry; Cursor IDE updates are in-app / changelog.
name: Tooling radar

on:
  workflow_dispatch:
  schedule:
    - cron: '40 14 * * 1'

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (for reproducible npm view)
        run: npm ci --legacy-peer-deps

      - name: Report versions
        run: |
          node scripts/report-external-tooling-versions.mjs
          echo '## JSON' >> "$GITHUB_STEP_SUMMARY"
          node scripts/report-external-tooling-versions.mjs --json >> "$GITHUB_STEP_SUMMARY"
