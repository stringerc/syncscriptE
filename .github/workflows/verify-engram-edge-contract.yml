# Fast static checks for the Supabase Engram Edge bridge (no Docker / Deno).
name: Engram Edge contract

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Engram contract tests
        run: node --test tests/engram-edge-contract.test.mjs
