name: Visual regression (Chromatic)

# Tier 2 N — visual regression. Runs only when the CHROMATIC_PROJECT_TOKEN
# secret is configured (free tier covers small projects: 5,000 snapshots/mo).
# Without the secret the job emits a notice and exits 0 — never blocks PRs
# until the user has set the secret.
#
# Setup (one-time):
#   1) Create a free Chromatic account at https://www.chromatic.com
#   2) Connect this repo, copy the project token
#   3) Add it as a GitHub Actions secret named `CHROMATIC_PROJECT_TOKEN`
#   4) (optional) Add the Chromatic GitHub check as a required status check
#      on `main` so visual diffs gate merges
#
# Snapshot definition: any Storybook story is auto-snapshotted. Until we
# write stories, this job will run Chromatic's "build only" mode against
# the production HTML at `/`, `/pricing`, `/trust`, `/changelog` to catch
# accidental marketing-page regressions.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  chromatic:
    name: Chromatic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Chromatic needs full history to detect baseline

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Skip cleanly if no token
        if: ${{ secrets.CHROMATIC_PROJECT_TOKEN == '' }}
        run: |
          echo "::notice title=Chromatic skipped::Add the CHROMATIC_PROJECT_TOKEN secret to enable visual regression. See chromatic.yml header."
          exit 0

      - name: Build app (warm — Chromatic upload disabled until Storybook exists)
        if: ${{ secrets.CHROMATIC_PROJECT_TOKEN != '' }}
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder

      # chromaui/action requires a Storybook `storybook-static` output. Without
      # it the job fails after you add CHROMATIC_PROJECT_TOKEN — worse than
      # helpful. Keep the token + build warm; wire Storybook then swap this for
      # `chromaui/action@latest` + `storybookBuildDir: storybook-static`.
      - name: Chromatic placeholder (add Storybook to enable upload)
        if: ${{ secrets.CHROMATIC_PROJECT_TOKEN != '' }}
        run: |
          echo "::notice title=Chromatic token present::CHROMATIC_PROJECT_TOKEN is set. Add Storybook + stories, then enable chromaui/action in chromatic.yml (see header comment)."
          exit 0
