name: Agent runner live verify

# Runs after every prod deploy + nightly + on-demand. **Strict by default:**
# unreachable runner fails the workflow. During bring-up, set repo Variable
# `AGENT_RUNNER_LIVE_RELAXED=1` to treat fetch errors as skip (exit 0).
# Legacy: `AGENT_RUNNER_LIVE_VERIFY=0` also relaxes fetch errors only.

on:
  workflow_dispatch:
  schedule:
    - cron: '7 4 * * *'   # 04:07 UTC daily
  workflow_run:
    workflows: ['Agent runner image']
    types: [completed]

permissions:
  contents: read

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Probe public /v1/health
        env:
          AGENT_RUNNER_BASE_URL: ${{ vars.AGENT_RUNNER_BASE_URL || 'https://nexus-agent-runner.syncscript.app' }}
          # Default strict (unset = fail if runner unreachable). Set repo Variable
          # AGENT_RUNNER_LIVE_RELAXED=1 during bring-up or maintenance windows.
          AGENT_RUNNER_LIVE_RELAXED: ${{ vars.AGENT_RUNNER_LIVE_RELAXED || '0' }}
        run: node scripts/verify-agent-runner-live.mjs
