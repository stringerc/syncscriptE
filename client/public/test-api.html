<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e8; color: #2e7d32; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>SyncScript API Test</h1>
    
    <div class="result" id="info">
        <h3>Connection Info:</h3>
        <p>Current URL: <span id="currentUrl"></span></p>
        <p>API Base URL: <span id="apiUrl"></span></p>
    </div>
    
    <div class="result">
        <h3>Test API Connection:</h3>
        <button onclick="testHealth()">Test Health Endpoint</button>
        <button onclick="testRegister()">Test Registration</button>
        <button onclick="testLogin()">Test Login</button>
        <div id="results"></div>
    </div>

    <script>
        // Display current info
        document.getElementById('currentUrl').textContent = window.location.href;
        
        // Get API URL (same logic as in the app)
        const getApiBaseUrl = () => {
            if (window.location.hostname === 'stringerc.github.io') {
                return 'DEMO_MODE';
            }
            if (window.location.hostname.includes('.trycloudflare.com')) {
                return `https://${window.location.hostname}/api`;
            }
            if (window.location.hostname === '192.168.1.246') {
                return 'http://192.168.1.246:3001/api';
            }
            return 'http://localhost:3001/api';
        };
        
        const apiUrl = getApiBaseUrl();
        document.getElementById('apiUrl').textContent = apiUrl;
        
        function addResult(message, isError = false) {
            const div = document.createElement('div');
            div.className = `result ${isError ? 'error' : 'success'}`;
            div.innerHTML = `<pre>${message}</pre>`;
            document.getElementById('results').appendChild(div);
        }
        
        async function testHealth() {
            try {
                addResult('Testing health endpoint...');
                const response = await fetch(`${apiUrl}/health`);
                const data = await response.json();
                addResult(`Health check: ${JSON.stringify(data, null, 2)}`);
            } catch (error) {
                addResult(`Health check failed: ${error.message}`, true);
            }
        }
        
        async function testRegister() {
            try {
                addResult('Testing registration...');
                const response = await fetch(`${apiUrl}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: `test${Date.now()}@example.com`,
                        password: 'Test123!',
                        name: 'Test User'
                    })
                });
                const data = await response.json();
                addResult(`Registration: ${JSON.stringify(data, null, 2)}`);
            } catch (error) {
                addResult(`Registration failed: ${error.message}`, true);
            }
        }
        
        async function testLogin() {
            try {
                addResult('Testing login...');
                const response = await fetch(`${apiUrl}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'newuser@example.com',
                        password: 'Test123!'
                    })
                });
                const data = await response.json();
                addResult(`Login: ${JSON.stringify(data, null, 2)}`);
            } catch (error) {
                addResult(`Login failed: ${error.message}`, true);
            }
        }
    </script>
</body>
</html>
